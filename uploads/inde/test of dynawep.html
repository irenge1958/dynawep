<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynawep Demo</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f4f4f4;
    }

    h1{
      color: #333;
    }

    .card{
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      margin-top: 20px;
    }

    button{
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .box{
      width: 80px;
      height: 80px;
      background: steelblue;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>Dynawep Simple Demo</h1>

  <p>
    This webpage can be modified using natural language with Dynawep.
  </p>

  <div class="card" id="card">
    <h2 id="title">Welcome</h2>

    <p id="text">
      This is a simple webpage element.
    </p>

    <div class="box" id="box"></div>

    <button id="btn">Click Me</button>
  </div>

</body>
</html>
